# 依存の脆弱性・更新を自動PR化する(2026-07 に astro の6件を手動対応した再発防止)。
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
